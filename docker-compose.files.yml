services:
  clamav:
    image: clamav/clamav:1.5.3
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "127.0.0.1:3310:3310"
    healthcheck:
      test: ["CMD-SHELL", "printf 'PING\\n' | nc 127.0.0.1 3310 | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s
